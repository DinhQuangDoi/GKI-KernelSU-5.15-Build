name: Build Kernel

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_branch:
        description: "KSU Branch (main/builtin/commit hash, empty = default)"
        type: string
        default: ""
        required: false

      version:
        description: "Custom version name (optional)"
        type: string
        default: ""
        required: false

      build_time:
        description: "Custom build time (optional, N/empty = current UTC)"
        type: string
        default: "N"
        required: false

      use_zram:
        description: "Enable ZRAM LZ4KD Compression"
        type: boolean
        default: true

      use_bbg:
        description: "Enable BBG (Baseband Guard)"
        type: boolean
        default: true

      use_rekernel:
        description: "Enable Re-Kernel Driver"
        type: boolean
        default: false

      cancel_susfs:
        description: "Disable SUSFS"
        type: boolean
        default: false

jobs:
  build-a13-5-15:
    uses: ./.github/workflows/kernel-a13-5-15.yml
    secrets: inherit
    with:
      kernelsu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_rekernel: ${{ inputs.use_rekernel || false }}
      cancel_susfs: ${{ inputs.cancel_susfs }}