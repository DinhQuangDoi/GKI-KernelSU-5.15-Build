name: Build Kernel - Android 13 (5.15)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernel_build_version:
        description: "Kernel Build Version"
        type: choice
        options:
          - android13-5.15.74-2022-12
          - android13-5.15.178-2025-03
        default: android13-5.15.74-2022-12
        required: true

      ksu_branch:
        description: "KSU Branch (main/builtin/commit hash, empty = default)"
        type: string
        default: ""
        required: false
      version:
        description: "Custom version name (optional)"
        type: string
        default: ""
        required: false
      build_time:
        description: "Custom build time (optional, N/empty = current UTC)"
        type: string
        default: "N"
        required: false
      use_zram:
        description: "Enable ZRAM LZ4KD Compression"
        type: boolean
        default: true
        required: false
      use_bbg:
        description: "Enable BBG (Baseband Guard)"
        type: boolean
        default: true
        required: false
      use_kpm:
        description: "Enable KPM (Kernel Parameter Management)"
        type: boolean
        default: true
        required: false
      use_rekernel:
        description: "Enable Re-Kernel Driver"
        type: boolean
        default: false
        required: false
      use_droidspaces:
        description: "Enable DroidSpaces Kernel Config (USER_NS, IPC_NS, PID_NS, Netfilter)"
        type: boolean
        default: true
        required: false
      cancel_susfs:
        description: "Disable SUSFS"
        type: boolean
        default: false
        required: false

  workflow_call:
    inputs:
      kernel_build_version:
        required: true
        type: string

      ksu_branch:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "N"
      use_zram:
        required: true
        type: boolean
      use_bbg:
        required: true
        type: boolean
      use_kpm:
        required: true
        type: boolean
        default: true
      use_rekernel:
        required: false
        type: boolean
        default: false
      cancel_susfs:
        required: false
        type: boolean
        default: false
      use_droidspaces:
        required: false
        type: boolean
        default: true
      enable_susfs:
        required: false
        type: boolean
        default: true

jobs:
  parse-version:
    name: "Parse Kernel Version"
    runs-on: ubuntu-latest
    outputs:
      kernel_version: ${{ steps.parse.outputs.kernel_version }}
      sub_level: ${{ steps.parse.outputs.sub_level }}
      os_patch_level: ${{ steps.parse.outputs.os_patch_level }}
      android_version: ${{ steps.parse.outputs.android_version }}
      build_name: ${{ steps.parse.outputs.build_name }}
      enable_susfs: ${{ steps.compute-susfs.outputs.enable_susfs }}
    steps:
      - name: Parse kernel_build_version
        id: parse
        run: |
          INPUT="${{ inputs.kernel_build_version }}"
          
          # Parse format: android13-5.15.74-2022-12
          if [[ $INPUT =~ ^(android[0-9]+)-([0-9]+\.[0-9]+)\.([0-9]+)-(.+)$ ]]; then
            ANDROID_VERSION="${BASH_REMATCH[1]}"
            KERNEL_VERSION="${BASH_REMATCH[2]}"
            SUB_LEVEL="${BASH_REMATCH[3]}"
            OS_PATCH_LEVEL="${BASH_REMATCH[4]}"
            BUILD_NAME="${KERNEL_VERSION}.${SUB_LEVEL}-${ANDROID_VERSION}-${OS_PATCH_LEVEL}"
            
            echo "kernel_version=${KERNEL_VERSION}" >> $GITHUB_OUTPUT
            echo "sub_level=${SUB_LEVEL}" >> $GITHUB_OUTPUT
            echo "os_patch_level=${OS_PATCH_LEVEL}" >> $GITHUB_OUTPUT
            echo "android_version=${ANDROID_VERSION}" >> $GITHUB_OUTPUT
            echo "build_name=${BUILD_NAME}" >> $GITHUB_OUTPUT
            
            echo "✓ Parsed: Android=$ANDROID_VERSION Kernel=$KERNEL_VERSION.$SUB_LEVEL Patch=$OS_PATCH_LEVEL"
          else
            echo "::error::Invalid kernel_build_version format: $INPUT"
            echo "Expected format: android13-5.15.74-2022-12"
            exit 1
          fi

      - name: Compute SUSFS status
        id: compute-susfs
        run: |
          # Determine enable_susfs based on inputs
          # Prefer explicit enable_susfs if provided via workflow_call
          # Otherwise use !cancel_susfs if provided via workflow_dispatch
          
          ENABLE_SUSFS="${{ inputs.enable_susfs }}"
          CANCEL_SUSFS="${{ inputs.cancel_susfs }}"
          
          # If enable_susfs is not empty (from workflow_call), use it
          if [ -n "$ENABLE_SUSFS" ] && [ "$ENABLE_SUSFS" != "null" ]; then
            if [ "$ENABLE_SUSFS" = "true" ] || [ "$ENABLE_SUSFS" = "True" ]; then
              echo "enable_susfs=true" >> $GITHUB_OUTPUT
            else
              echo "enable_susfs=false" >> $GITHUB_OUTPUT
            fi
          else
            # Otherwise compute from cancel_susfs (workflow_dispatch)
            if [ "$CANCEL_SUSFS" = "true" ] || [ "$CANCEL_SUSFS" = "True" ]; then
              echo "enable_susfs=false" >> $GITHUB_OUTPUT
            else
              echo "enable_susfs=true" >> $GITHUB_OUTPUT
            fi
          fi

  build-kernel:
    name: "${{ needs.parse-version.outputs.build_name }}"
    needs: parse-version
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: ${{ needs.parse-version.outputs.android_version }}
      kernel_version: ${{ needs.parse-version.outputs.kernel_version }}
      sub_level: ${{ needs.parse-version.outputs.sub_level }}
      os_patch_level: ${{ needs.parse-version.outputs.os_patch_level }}

      ksu_branch: ${{ inputs.ksu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time }}
      use_zram: ${{ inputs.use_zram == true }}
      use_bbg: ${{ inputs.use_bbg == true }}
      use_kpm: ${{ inputs.use_kpm == true }}
      use_rekernel: ${{ inputs.use_rekernel == true }}
      use_droidspaces: ${{ inputs.use_droidspaces == true }}
      enable_susfs: ${{ needs.parse-version.outputs.enable_susfs == 'true' }}
