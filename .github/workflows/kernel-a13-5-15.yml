name: Build Kernel - Android 13 (5.15)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      kernelsu_branch:
        description: "KSU Branch (main/builtin/commit hash, empty = default)"
        type: string
        default: ""
        required: false

      version:
        description: "Custom version name (optional)"
        type: string
        default: ""
        required: false

      build_time:
        description: "Custom build time (optional, N/empty = current UTC)"
        type: string
        default: "N"
        required: false

      use_zram:
        description: "Enable ZRAM LZ4KD Compression"
        type: boolean
        default: true

      use_bbg:
        description: "Enable BBG (Baseband Guard)"
        type: boolean
        default: true

      use_rekernel:
        description: "Enable Re-Kernel Driver"
        type: boolean
        default: false

      cancel_susfs:
        description: "Disable SUSFS"
        type: boolean
        default: false

  workflow_call:
    inputs:
      kernelsu_branch:
        required: true
        type: string

      version:
        required: false
        type: string

      build_time:
        required: false
        type: string
        default: "N"

      use_zram:
        required: true
        type: boolean

      use_bbg:
        required: true
        type: boolean

      use_rekernel:
        required: false
        type: boolean
        default: false

      cancel_susfs:
        required: false
        type: boolean
        default: false

jobs:
  build-kernel:
    name: "5.15.178-android13-2025-03"
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      android_version: "android13"
      kernel_version: "5.15"
      sub_level: "178"
      os_patch_level: "2025-03"
      ksu_variant: "ReSukiSU"
      ksu_branch: ${{ inputs.kernelsu_branch }}
      version: ${{ inputs.version || '' }}
      build_time: ${{ inputs.build_time }}
      use_zram: ${{ inputs.use_zram }}
      use_bbg: ${{ inputs.use_bbg }}
      use_kpm: false
      use_rekernel: ${{ inputs.use_rekernel || false }}
      enable_susfs: ${{ !inputs.cancel_susfs }}