# ========================================
# GKI Kernel Build Workflow
# ========================================
# This workflow compiles Android GKI kernel for android13-5.15.178
# Called by kernel-a13-5-15.yml via workflow_call
# ========================================

name: Kernel Build Process (android13-5.15.178)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  actions: write

on:
  workflow_call:
    inputs:
      android_version:
        required: true
        type: string
      kernel_version:
        required: true
        type: string
      sub_level:
        required: true
        type: string
      os_patch_level:
        required: true
        type: string
      ksu_variant:
        required: true
        type: string
      ksu_branch:
        required: true
        type: string
      version:
        required: false
        type: string
      build_time:
        required: false
        type: string
        default: "Sun Dec 01 08:10:00 UTC 2024"
      use_zram:
        required: true
        type: boolean
        default: true
      use_bbg:
        required: true
        type: boolean
        default: true
      use_kpm:
        required: true
        type: boolean
        default: true
      use_rekernel:
        required: false
        type: boolean
        default: false
      enable_susfs:
        required: true
        type: boolean
        default: true

jobs:
  build-kernel:
    name: "${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.android_version }}-${{ inputs.os_patch_level }}-ReSukiSU"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"

    steps:
      # ==================== Build Info Summary ====================
      - name: Build Info Summary
        run: |
          echo "========================================"
          echo "       Kernel Build Configuration"
          echo "========================================"
          echo "Android Version  : ${{ inputs.android_version }}"
          echo "Kernel Version : ${{ inputs.kernel_version }}"
          echo "Sub Level     : ${{ inputs.sub_level }}"
          echo "Patch Level   : ${{ inputs.os_patch_level }}"
          echo "KSU Variant   : ReSukiSU"
          echo "KSU Branch    : ${{ inputs.ksu_branch }}"
          echo "Build Time    : ${{ inputs.build_time }}"
          echo "SUSFS Status  : ${{ inputs.enable_susfs }}"
          echo "ZRAM Enhance  : ${{ inputs.use_zram }}"
          echo "BBG Patches  : ${{ inputs.use_bbg }}"
          echo "KPM Feature  : ${{ inputs.use_kpm }}"
          echo "Re-Kernel    : ${{ inputs.use_rekernel }}"
          echo "========================================"

      # ==================== Clean up disk space ====================
      - name: Clean up disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_swap: true
          remove_packages: "azure-cli google-cloud-cli microsoft-edge-stable google-chrome-stable firefox postgresql* temurin-* *llvm* mysql* dotnet-sdk-*"
          remove_packages_one_command: true
          remove_folders: "/usr/share/swift /usr/share/miniconda /usr/share/az* /usr/local/lib/node_modules /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle"
          rm_cmd: "rmz"
          rmz_version: "3.1.1"
          testing: false

      # ==================== Checkout repository code ====================
      - name: Checkout repository
        uses: actions/checkout@v6

      # ==================== Initialize build environment ====================
      - name: Initialize build environment
        run: |
          CONFIG="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}"
          KERNEL_ROOT="$GITHUB_WORKSPACE/$CONFIG"
          mkdir -p "$KERNEL_ROOT"

          cat >> $GITHUB_ENV << EOF
          CONFIG=$CONFIG
          KERNEL_ROOT=$KERNEL_ROOT
          DEFCONFIG=$KERNEL_ROOT/common/arch/arm64/configs/gki_defconfig
          SUSFS4KSU=$GITHUB_WORKSPACE/susfs4ksu
          KERNEL_PATCHES=$GITHUB_WORKSPACE/kernel_patches
          SUKISU_PATCHES=$GITHUB_WORKSPACE/SukiSU_patch
          ZZH_PATCHES=$GITHUB_WORKSPACE
          ANYKERNEL3=$GITHUB_WORKSPACE/AnyKernel3
          ACTION_BUILD=$GITHUB_WORKSPACE/Action-Build
          AVBTOOL=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/bin/avbtool
          MKBOOTIMG=$GITHUB_WORKSPACE/mkbootimg/mkbootimg.py
          UNPACK_BOOTIMG=$GITHUB_WORKSPACE/mkbootimg/unpack_bootimg.py
          BOOT_SIGN_KEY_PATH=$GITHUB_WORKSPACE/kernel-build-tools/linux-x86/share/avb/testkey_rsa2048.pem
          EOF

          mkdir -p "$GITHUB_WORKSPACE/git-repo"
          curl -L https://storage.googleapis.com/git-repo-downloads/repo -o "$GITHUB_WORKSPACE/git-repo/repo"
          chmod 0755 "$GITHUB_WORKSPACE/git-repo/repo"
          echo "$GITHUB_WORKSPACE/git-repo" >> "$GITHUB_PATH"
          echo "REPO=$GITHUB_WORKSPACE/git-repo/repo" >> $GITHUB_ENV

      # ==================== Display config file content ====================
      - name: Display config info
        run: |
          CONFIG_FILE="$GITHUB_WORKSPACE/config/config"
          if [ -f "$CONFIG_FILE" ]; then
            echo "Loading config file: $CONFIG_FILE"
            cat "$CONFIG_FILE"
          fi

      # ==================== Install build dependencies ====================
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ccache python3 git curl build-essential libssl-dev bison flex libelf-dev dwarves

      # ==================== Configure ccache ====================
      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/bazel
          ccache --version
          ccache --max-size=2G
          ccache --set-config=compression=true
          echo "CCACHE_DIR=$HOME/.ccache" >> $GITHUB_ENV

      # ==================== Restore ccache cache ====================
      - name: Restore ccache cache
        uses: actions/cache@v5
        with:
          path: ~/.ccache
          key: ${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.sub_level }}-ccache-

      # ==================== Cache toolchain ====================
      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v5
        with:
          path: |
            kernel-build-tools
            mkbootimg
          key: toolchain-${{ runner.os }}-v1

      # ==================== Download toolchain ====================
      - name: Download toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          AOSP_MIRROR=https://android.googlesource.com
          BRANCH=main-kernel-build-2024
          git clone $AOSP_MIRROR/kernel/prebuilts/build-tools -b $BRANCH --depth 1 kernel-build-tools
          git clone $AOSP_MIRROR/platform/system/tools/mkbootimg -b $BRANCH --depth 1 mkbootimg

      # ==================== Generate signing key ====================
      - name: Generate signing key
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 > $BOOT_SIGN_KEY_PATH

      # ==================== Configure Git ====================
      - name: Configure Git
        run: |
          git config --global user.name "DinhQuangDoi"
          git config --global user.email "dinhquangdoi99@gmail.com"

      # ==================== Clone dependency repositories ====================
      - name: Clone dependency repositories
        run: |
          SUSFS_BRANCH="gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}"

          echo "Cloning AnyKernel3..."
          git clone https://github.com/coolzyd9107/AnyKernel3.git -b "master"
          rm -rf AnyKernel3/.git

          echo "Cloning SUSFS (branch: $SUSFS_BRANCH)..."
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b "$SUSFS_BRANCH"

          SUSFS_LATEST_COMMIT_DATE=$(git -C susfs4ksu log -1 --date=format:'%Y-%m-%d %H:%M:%S %z' --format='%cd')
          echo "SUSFS_LATEST_COMMIT_DATE=$SUSFS_LATEST_COMMIT_DATE" >> $GITHUB_ENV
          echo "SUSFS repository latest commit date: $SUSFS_LATEST_COMMIT_DATE"

          echo "Preparing patch resources..."
          git clone https://github.com/WildKernels/kernel_patches.git
          git clone https://github.com/ShirkNeko/SukiSU_patch.git
          git clone https://github.com/Numbersf/Action-Build.git --depth=1

      # ==================== Initialize and sync kernel source ====================
      - name: Initialize and sync kernel source
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          git clone https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-gnu-6.4.1.git gcc

          FORMATTED_BRANCH="${{ inputs.android_version }}-${{ inputs.kernel_version }}-${{ inputs.os_patch_level }}"
          echo "Initializing repo, branch: common-${FORMATTED_BRANCH}"

          $REPO init --depth=1 -u https://android.googlesource.com/kernel/manifest -b common-${FORMATTED_BRANCH} --repo-rev=v2.16

          REMOTE_BRANCH=$(git ls-remote https://android.googlesource.com/kernel/common ${FORMATTED_BRANCH})
          DEFAULT_MANIFEST_PATH=.repo/manifests/default.xml

          if grep -q deprecated <<< $REMOTE_BRANCH; then
            echo "Detected deprecated branch: $FORMATTED_BRANCH}"
            sed -i "s/\"${FORMATTED_BRANCH}\"/\"deprecated\/${FORMATTED_BRANCH}\"/g" $DEFAULT_MANIFEST_PATH
          fi

          $REPO --trace sync -c -j$(nproc --all) --no-tags --fail-fast
          echo "REMOTE_BRANCH=$REMOTE_BRANCH" >> $GITHUB_ENV

      # ==================== Extract actual sublevel ====================
      - name: Extract actual sublevel
        run: |
          ACTUAL_SUBLEVEL="${{ inputs.sub_level }}"
          if [[ -f "$KERNEL_ROOT/common/Makefile" ]]; then
            EXTRACTED=$(grep '^SUBLEVEL = ' "$KERNEL_ROOT/common/Makefile" | awk '{print $3}')
            [[ -n "$EXTRACTED" ]] && ACTUAL_SUBLEVEL="$EXTRACTED"
          fi
          echo "ACTUAL_SUBLEVEL=$ACTUAL_SUBLEVEL" >> $GITHUB_ENV
          echo "Actual sublevel: $ACTUAL_SUBLEVEL"

      # ==================== Determine KernelSU branch ====================
      - name: Determine KernelSU branch
        id: ksu-branch
        run: |
          branch_input="${{ inputs.ksu_branch }}"
          if [ -n "$branch_input" ]; then
            BRANCH="-s $branch_input"
            echo "Using custom branch/commit: $branch_input"
          else
            BRANCH="-s main"
          fi
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "KSU branch: $BRANCH"

      # ==================== Add KernelSU ====================
      - name: Add KernelSU
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          echo "Adding ReSukiSU..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/main/kernel/setup.sh" | bash $BRANCH

          if [ -d "KernelSU/.git" ]; then
            KSU_LATEST_COMMIT_DATE=$(git -C KernelSU log -1 --date=format:'%Y-%m-%d %H:%M:%S %z' --format='%cd')
            echo "KSU_LATEST_COMMIT_DATE=$KSU_LATEST_COMMIT_DATE" >> $GITHUB_ENV
            echo "KSU repository latest commit date: $KSU_LATEST_COMMIT_DATE"
          else
            echo "KSU_LATEST_COMMIT_DATE=unknown" >> $GITHUB_ENV
          fi

      # ==================== Apply SUSFS patches ====================
      - name: Apply SUSFS patches
        if: inputs.enable_susfs
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          echo "Applying SUSFS patches..."
          SUSFS_VERSION=$(grep -E '^#define[[:space:]]+SUSFS_VERSION' "$SUSFS4KSU/kernel_patches/include/linux/susfs.h" | awk '{print $3}' | tr -d '"' | sed 's/^v//')
          if [ -z "$SUSFS_VERSION" ]; then
            SUSFS_VERSION="2.0.0"
          fi
          if [ ! -d "$KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}" ]; then
            echo "Not found wild/susfs_fix_patches/v${SUSFS_VERSION}, falling back to v2.0.0"
            SUSFS_VERSION="2.0.0"
          fi
          echo "SUSFS fix patch version: v${SUSFS_VERSION}"

          cp $SUSFS4KSU/kernel_patches/50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch ./common/
          cp $SUSFS4KSU/kernel_patches/fs/* ./common/fs/
          cp $SUSFS4KSU/kernel_patches/include/linux/* ./common/include/linux/

          echo "ReSukiSU uses built-in SUSFS support"

          cd $KERNEL_ROOT/common
          patch -p1 < 50_add_susfs_in_gki-${{ inputs.android_version }}-${{ inputs.kernel_version }}.patch || true

          CURRENT_SUB="${{ inputs.sub_level }}"
          if [[ ! "$CURRENT_SUB" =~ ^[0-9]+$ ]]; then
            CURRENT_SUB=99999
          fi

          # Android 13 - 5.15 fixes
          if [[ "${{ inputs.android_version }}" == "android13" && "${{ inputs.kernel_version }}" == "5.15" ]]; then
            if [[ "$CURRENT_SUB" -le 41 ]]; then
              cp $KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}/a13-5.15/namespace.c.patch ./
              patch -p1 < namespace.c.patch || true
              cp $KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}/a13-5.15/fdinfo.c.patch ./
              patch -p1 < fdinfo.c.patch || true
              cp $KERNEL_PATCHES/wild/susfs_fix_patches/v${SUSFS_VERSION}/a13-5.15/open.c.patch ./
              patch -p1 < open.c.patch || true
            fi
            if grep -q 'vm_flags_clear(new_vma, VM_PAD_MASK)' ./mm/mmap.c; then
              sed -i 's/vm_flags_clear(new_vma, VM_PAD_MASK);/new_vma->vm_flags \&= ~VM_PAD_MASK;/g' ./mm/mmap.c
            fi
            if [[ "$CURRENT_SUB" -le 148 && "${{ inputs.os_patch_level }}" != "2024-05" ]]; then
              sed -i -e 's/goto show_pad;/return 0;/' ./fs/proc/task_mmu.c
            fi
          fi

      # ==================== Unicode bypass fix ====================
      - name: Apply Unicode bypass fix
        if: inputs.enable_susfs
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          patch -p1 --forward < "$ACTION_BUILD/patches/unicode_bypass_fix_6.1-.patch" || true

      # ==================== Configure ZRAM LZ4 patch stack ====================
      - name: Configure ZRAM LZ4 patch stack
        if: inputs.use_zram
        working-directory: ${{ env.KERNEL_ROOT }}/common
        run: |
          echo "Upgrading LZ4..."
          rm -f lib/lz4/lz4_compress.c lib/lz4/lz4_decompress.c lib/lz4/lz4defs.h lib/lz4/lz4hc_compress.c

          cp -r $ZZH_PATCHES/zram/lz4/* ./lib/lz4/
          cp -r $ZZH_PATCHES/zram/include/linux/* ./include/linux/
          bash $ZZH_PATCHES/zram/apply_lz4_neon.sh

          cp -r $SUKISU_PATCHES/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r $SUKISU_PATCHES/other/zram/lz4k/lib/* ./lib/
          cp -r $SUKISU_PATCHES/other/zram/lz4k/crypto/* ./crypto/
          cp -r $SUKISU_PATCHES/other/zram/lz4k_oplus ./lib/

          cp $SUKISU_PATCHES/other/zram/zram_patch/${{ inputs.kernel_version }}/lz4kd.patch ./
          if ! patch -p1 -F 3 < lz4kd.patch; then
            echo "::warning::lz4kd.patch apply failed, may already be applied or context mismatch"
          fi

          cp $SUKISU_PATCHES/other/zram/zram_patch/${{ inputs.kernel_version }}/lz4k_oplus.patch ./
          if ! patch -p1 -F 3 < lz4k_oplus.patch; then
            echo "::warning::lz4k_oplus.patch apply failed, may already be applied or context mismatch"
          fi

      # ==================== Backup original defconfig ====================
      - name: Backup original defconfig
        run: cp "$DEFCONFIG" "$DEFCONFIG.orig"

      # ==================== Configure ZRAM options ====================
      - name: Configure ZRAM options
        if: inputs.use_zram
        run: |
          CONFIG_FILE="$DEFCONFIG"
          if grep -q "CONFIG_ZSMALLOC" "$CONFIG_FILE"; then
            sed -i 's/CONFIG_ZSMALLOC=m/CONFIG_ZSMALLOC=y/g' "$CONFIG_FILE"
          else
            echo "CONFIG_ZSMALLOC=y" >> "$CONFIG_FILE"
          fi
          sed -i 's/CONFIG_ZRAM=m/CONFIG_ZRAM=y/g' "$CONFIG_FILE"

          if grep -q "CONFIG_ZSMALLOC=y" "$CONFIG_FILE" && grep -q "CONFIG_ZRAM=y" "$CONFIG_FILE"; then
            cat "$ZZH_PATCHES/config/zram.config" >> "$CONFIG_FILE"
          fi

      # ==================== Add BBG anti-wipe patch ====================
      - name: Add BBG anti-wipe patch
        if: inputs.use_bbg
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          wget -O- https://github.com/vc-teahouse/Baseband-guard/raw/main/setup.sh | bash
          echo "CONFIG_BBG=y" >> common/arch/arm64/configs/gki_defconfig
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' common/security/Kconfig

      # ==================== Apply Re-Kernel ====================
      - name: Apply Re-Kernel
        if: inputs.use_rekernel
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          set -e
          echo "Integrating Re-Kernel..."
          TMP_REKERNEL=/tmp/rekernel
          rm -rf "$TMP_REKERNEL"
          git clone --depth 1 https://github.com/Sakion-Team/Re-Kernel.git "$TMP_REKERNEL"

          mkdir -p common/drivers/rekernel
          cp "$TMP_REKERNEL/LKM-Source/rekernel.c" common/drivers/rekernel/
          cp "$TMP_REKERNEL/LKM-Source/rekernel.h" common/drivers/rekernel/

          cat > common/drivers/rekernel/Kconfig << 'EOF'
          menu "Re:Kernel"
          config REKERNEL
              bool "Re:Kernel support (GKI Vendor Hooks)"
              default y
              help
                Enable Re-Kernel support via GKI Vendor Hooks.

          config REKERNEL_NETWORK
              bool "Re:Kernel NetReceive unfreeze support"
              depends on REKERNEL
              default n
          endmenu
          EOF

          cat > common/drivers/rekernel/Makefile << 'EOF'
          obj-$(CONFIG_REKERNEL) += rekernel.o
          ccflags-$(CONFIG_REKERNEL_NETWORK) += -DNETWORK_FILTER
          EOF

          if ! grep -qF 'source "drivers/rekernel/Kconfig"' common/drivers/Kconfig; then
            sed -i '/^endmenu$/i source "drivers/rekernel/Kconfig"' common/drivers/Kconfig
          fi
          if ! grep -qF 'obj-$(CONFIG_REKERNEL) += rekernel/' common/drivers/Makefile; then
            echo 'obj-$(CONFIG_REKERNEL) += rekernel/' >> common/drivers/Makefile
          fi

          REKERNEL_H="common/drivers/rekernel/rekernel.h"
          VERSION_MACRO="KERNEL_$(echo "${{ inputs.kernel_version }}" | tr '.' '_')"
          if grep -q "^// #define ${VERSION_MACRO}$" "$REKERNEL_H"; then
            sed -i "s|^// #define ${VERSION_MACRO}$|#define ${VERSION_MACRO}|" "$REKERNEL_H"
          fi

          sed -i 's|#include <../android/binder_internal.h>|#include "../../drivers/android/binder_internal.h"|g' common/drivers/rekernel/rekernel.c
          grep -qF '#include <linux/seq_file.h>' common/drivers/rekernel/rekernel.c || sed -i '/#include <trace\/hooks\/signal.h>/a #include <linux/seq_file.h>' common/drivers/rekernel/rekernel.c

          grep -q '^CONFIG_REKERNEL=y$' "$DEFCONFIG" || echo "CONFIG_REKERNEL=y" >> "$DEFCONFIG"
          grep -q '^CONFIG_REKERNEL_NETWORK=y$' "$DEFCONFIG" || echo "CONFIG_REKERNEL_NETWORK=y" >> "$DEFCONFIG"

      # ==================== Configure kernel options ====================
      - name: Configure kernel options
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU=y
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          EOF

          sed -i 's/check_defconfig//' ./common/build.config.gki

      # ==================== Enable KPM ====================
      - name: Enable KPM
        if: inputs.use_kpm
        run: |
          if [ "${{ inputs.ksu_variant }}" == "ReSukiSU" ]; then
            echo "CONFIG_KPM=y" >> "$DEFCONFIG"
          fi

      # ==================== Add SUSFS configuration ====================
      - name: Add SUSFS configuration
        if: inputs.enable_susfs
        run: |
          cat >> "$DEFCONFIG" << 'EOF'
          CONFIG_KSU_SUSFS=y
          CONFIG_KSU_SUSFS_SUS_PATH=y
          CONFIG_KSU_SUSFS_SUS_MOUNT=y
          CONFIG_KSU_SUSFS_SUS_KSTAT=y
          CONFIG_KSU_SUSFS_SPOOF_UNAME=y
          CONFIG_KSU_SUSFS_ENABLE_LOG=y
          CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y
          CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y
          CONFIG_KSU_SUSFS_OPEN_REDIRECT=y
          CONFIG_KSU_SUSFS_SUS_MAP=y
          EOF

      # ==================== Configure kernel name ====================
      - name: Configure kernel name
        working-directory: ${{ env.KERNEL_ROOT }}
        run: |
          if [ -f "build/build.sh" ]; then
            sed -i 's/-dirty//' ./common/scripts/setlocalversion
          else
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' ./common/BUILD.bazel
            sed -i '/kmi_symbol_list_strict_mode/d' ./common/BUILD.bazel
            rm -rf ./common/android/abi_gki_protected_exports_*
            sed -i "/stable_scmversion_cmd/s/-maybe-dirty//g" ./build/kernel/kleaf/impl/stamp.bzl
          fi

          if [ -n "${{ inputs.version }}" ]; then
            CLEAN_VERSION=$(echo "${{ inputs.version }}" | sed -E 's/^[0-9]+\.[0-9]+\.[0-9]+//')
            KMI_TAG="${{ inputs.android_version }}"
            SUFFIX="-${KMI_TAG}${CLEAN_VERSION}"
            sed -i "\$s|echo \"\$res\"|echo \"${SUFFIX}\"|" ./common/scripts/setlocalversion 2>/dev/null || true
            sed -i '/^CONFIG_LOCALVERSION=/ s/="\([^"]*\)"/="'"$CLEAN_VERSION"'"/' ./common/arch/arm64/configs/gki_defconfig
          elif [ ! -f "build/build.sh" ]; then
            cd ./common
            BID="ab$((RANDOM % 90000000 + 10000000))"
            GHASH=$(git rev-parse --verify HEAD | cut -c1-13)
            SUFFIX="-${KMI_TAG}-g${GHASH}-${BID}"
            perl -i -0777 -pe 's/(.*)echo "\$\{KERNELVERSION\}\$\{file_localversion\}\$\{config_localversion\}\$\{LOCALVERSION\}\$\{scm_version\}"/$1echo "\$\{KERNELVERSION\}'"${SUFFIX}"'\$\{config_localversion\}"/s' ./scripts/setlocalversion 2>/dev/null || true
          fi

      # ==================== Custom build time ====================
      - name: Set custom build time
        shell: bash
        run: |
          INPUT_TIME="${{ inputs.build_time }}"
          if [[ -n "$INPUT_TIME" && "$INPUT_TIME" != "N" && "$INPUT_TIME" != "n" ]]; then
            DATESTR="$INPUT_TIME"
          else
            DATESTR="$(TZ='UTC' date +'%a %b %d %T %Z %Y')"
          fi

          echo "Using build time: $DATESTR"
          echo "KBUILD_BUILD_TIMESTAMP=$DATESTR" >> "$GITHUB_ENV"
          echo "KBUILD_BUILD_VERSION=1" >> "$GITHUB_ENV"

          f="$KERNEL_ROOT/common/scripts/mkcompile_h"
          if [ -f "$f" ]; then
            echo "Applying 5.x classic timestamp patch: $f"
            perl -pi -e "s{UTS_VERSION=\"\\\$\(echo \\\$UTS_VERSION \\\$CONFIG_FLAGS \\\$TIMESTAMP \\| cut -b -\\\$UTS_LEN\)\"}{UTS_VERSION=\"#1 SMP PREEMPT $DATESTR\"}" "$f"
          fi

      # ==================== Build kernel ====================
      - name: Build kernel
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_on: timeout
          command: |
            echo "Current KSU latest commit date: ${KSU_LATEST_COMMIT_DATE}"
            echo "Current SUSFS latest commit date: ${SUSFS_LATEST_COMMIT_DATE}"
            set -ex
            cd "$KERNEL_ROOT"

            sed -i 's/BUILD_SYSTEM_DLKM=1/BUILD_SYSTEM_DLKM=0/' ./common/build.config.gki.aarch64
            sed -i '/MODULES_ORDER=android\/gki_aarch64_modules/d' ./common/build.config.gki.aarch64
            sed -i '/KMI_SYMBOL_LIST_STRICT_MODE/d' ./common/build.config.gki.aarch64

            LTO=thin BUILD_CONFIG=common/build.config.gki.aarch64 build/build.sh CC="/usr/bin/ccache clang" || exit 1
            strings "out/${{ inputs.android_version }}-${{ inputs.kernel_version }}/dist/Image" | grep 'Linux version'

      # ==================== Prepare Boot image ====================
      - name: Prepare Boot image
        run: |
          mkdir -p bootimgs

          SRC_DIR="$KERNEL_ROOT/out/${{ inputs.android_version }}-${{ inputs.kernel_version }}/dist"

          cp "$SRC_DIR/Image" ./bootimgs/
          cp "$SRC_DIR/Image.lz4" ./bootimgs/
          cp "$SRC_DIR/Image" ./
          cp "$SRC_DIR/Image.lz4" ./
          gzip -n -k -f -9 ./Image > ./Image.gz

      # ==================== Create AnyKernel3 zip ====================
      - name: Create AnyKernel3 zip
        run: |
          cd $ANYKERNEL3
          ZIP_NAME="${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-AnyKernel3.zip"
          mv ../Image ./Image
          zip -r "../$ZIP_NAME" ./*

      # ==================== Build Boot image ====================
      - name: Build Boot image
        working-directory: bootimgs
        run: |
          gzip -n -k -f -9 ./Image > ./Image.gz

          $MKBOOTIMG --header_version 4 --kernel Image --output boot.img
          $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
          cp ./boot.img ../${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot.img

          $MKBOOTIMG --header_version 4 --kernel Image.gz --output boot-gz.img
          $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot-gz.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
          cp ./boot-gz.img ../${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot-gz.img

          $MKBOOTIMG --header_version 4 --kernel Image.lz4 --output boot-lz4.img
          $AVBTOOL add_hash_footer --partition_name boot --partition_size $((64 * 1024 * 1024)) --image boot-lz4.img --algorithm SHA256_RSA2048 --key $BOOT_SIGN_KEY_PATH
          cp ./boot-lz4.img ../${{ inputs.android_version }}-${{ inputs.kernel_version }}.${{ inputs.sub_level }}-${{ inputs.os_patch_level }}-boot-lz4.img

      # ==================== Collect patch reject files ====================
      - name: Collect patch reject files
        if: always()
        run: |
          REJECTS_DIR="$GITHUB_WORKSPACE/patch-rejects"
          mkdir -p "$REJECTS_DIR"

          mapfile -t REJS < <(find "$KERNEL_ROOT" -type f -name '*.rej')
          REJ_COUNT=${#REJS[@]}
          echo "Found $REJ_COUNT .rej file(s)"
          echo "REJ_COUNT=$REJ_COUNT" >> $GITHUB_ENV

          if [ "$REJ_COUNT" -gt 0 ]; then
            for REJ in "${REJS[@]}"; do
              REL="${REJ#"$KERNEL_ROOT"/}"
              DEST="$REJECTS_DIR/$REL"
              mkdir -p "$(dirname "$DEST")"
              cp "$REJ" "$DEST"

              ORIG="${REJ%.rej}"
              if [ -f "$ORIG" ]; then
                cp "$ORIG" "${DEST%.rej}"
              fi
              echo "$REL" >> "$REJECTS_DIR/index.txt"
            done
          fi

      # ==================== Upload build artifacts ====================
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ReSukiSU_kernel-${{ env.CONFIG }}
          path: |
            *AnyKernel3.zip
            *.img
          compression-level: 9

      # ==================== Upload patch reject files ====================
      - name: Upload patch reject files
        if: always() && env.REJ_COUNT > 0
        uses: actions/upload-artifact@v6
        with:
          name: ReSukiSU_kernel-${{ env.CONFIG }}-Rejects
          path: patch-rejects/
          if-no-files-found: ignore
          compression-level: 9